<html lang="en">
<head>

>
  <div class="page page--activities">
    <header class="top-bar">
      <a class="icon-button" href="menu.html" aria-label="Open menu">
        <img src="assets/icons/menu-icon-white.png" alt="">
      </a>
      <button class="icon-button" type="button" id="sound-toggle" aria-label="Turn sound off">
        <img id="sound-icon" src="assets/icons/sound-high-solid-white.png" alt="">

    <main class="activities" aria-label="Morning Activities">
      <h1 class="activities-title">BLOODY BITES</h1>
      <p class="activities-time">9:45–11:30</p>

      <section class="activity-block activity-block--pancakes">
        <div class="activity-text">
          <p>Come for</p>
          <p class="accent">PANCAKES!</p>
        </div>
        <img class="activity-img activity-img--pancakes" src="assets/activities/pancakes.png" alt="">
      </section>

      <img class="activity-divider activity-divider--flowers activity-bleed" src="assets/activities/flowers.png" alt="">

      <section class="activity-block activity-block--masks">
        <p>make</p>
        <p class="accent">MASQUERADE MASKS</p>
        <img class="activity-img activity-img--masks activity-bleed" src="assets/activities/masquerade-masks.png" alt="">
      </section>

      <section class="activity-block activity-block--games">
        <div class="activity-text">
          <p>and</p>
          <p class="accent">PLAY GAMES!</p>
        </div>
        <div class="activity-games-art">
          <img src="assets/activities/dice.png" alt="">
          <img src="assets/activities/chess-pieces.png" alt="">
        </div>
      </section>

      <img class="activity-divider activity-divider--ladder activity-bleed" src="assets/activities/game-ladder.png" alt="">

      <a class="activities-next" href="movie.html">Next Activity (Movie)</a>

      </p>
    </main>
  </div>
